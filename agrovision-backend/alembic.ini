# A generic, single database configuration for Alembic.
[alembic]
script_location = alembic
sqlalchemy.url = postgresql://agro_user:agro_secure_pass@localhost:5432/agrovision_main

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[loggers]
keys = root,sqlalchemy,alembic

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
