apiVersion: apps/v1
kind: Deployment
metadata:
  name: agrovision-backend
  namespace: production
  labels:
    app: agrovision-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agrovision-backend
  template:
    metadata:
      labels:
        app: agrovision-backend
    spec:
      containers:
      - name: fastapi-app
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/agrovision-backend:v1.0.0
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
        envFrom:
        - secretRef:
            name: db-credentials-secret
        livenessProbe:
          httpGet:
            path: /api/v1/healthz
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/healthz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agrovision-backend-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agrovision-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
